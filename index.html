<script>
// ====== SUPABASE ======
const SUPABASE_URL = 'https://yhltyfilfcjaxwcqcxsu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobHR5ZmlsZmNqYXh3Y3FjeHN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzAwMjEsImV4cCI6MjA5NjcwNjAyMX0.8oA09lwE3TCg06DVaeyZflxwRdIihB0Tk1Wij9tiRfI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ====== РПЛ 2026/2027 — 1 ТУР ======
// Все времена МСК (GMT+3), ts = UTC
function toUTC(y,mo,d,h,m){ return Date.UTC(y,mo-1,d,h-3,m||0); }

const RPL_MATCHES = [
  {id:'rpl1_1', home:'ЦСКА',          away:'Балтика',          hc:'#E30613', ha:'ЦСК', ac:'#003F7F', aa:'БЛТ', ts:toUTC(2026,7,24,20,0),  venue:'ВЭБ.РФ Арена, Москва'},
  {id:'rpl1_2', home:'Динамо',         away:'Крылья Советов',   hc:'#005CA9', ha:'ДИН', ac:'#013A81', aa:'КСВ', ts:toUTC(2026,7,25,14,0),  venue:'ВТБ Арена, Москва'},
  {id:'rpl1_3', home:'Акрон',          away:'Зенит',            hc:'#CC0000', ha:'АКР', ac:'#009CDE', aa:'ЗЕН', ts:toUTC(2026,7,25,16,15), venue:'Самара Арена, Самара'},
  {id:'rpl1_4', home:'Факел',          away:'Динамо Мх',        hc:'#E55A00', ha:'ФКЛ', ac:'#1A4B8C', aa:'ДМХ', ts:toUTC(2026,7,25,18,30), venue:'Центральный стадион, Воронеж'},
  {id:'rpl1_5', home:'Спартак',        away:'Родина',           hc:'#E20613', ha:'СПА', ac:'#2D7336', aa:'РОД', ts:toUTC(2026,7,25,20,45), venue:'Открытие Арена, Москва'},
  {id:'rpl1_6', home:'Оренбург',       away:'Ростов',           hc:'#FF8C00', ha:'ОРЕ', ac:'#1C3F8C', aa:'РОС', ts:toUTC(2026,7,26,14,30), venue:'Газпром Арена, Оренбург'},
  {id:'rpl1_7', home:'Локомотив',      away:'Ахмат',            hc:'#00843D', ha:'ЛОК', ac:'#2D6A3F', aa:'АХМ', ts:toUTC(2026,7,26,17,0),  venue:'РЖД Арена, Москва'},
  {id:'rpl1_8', home:'Рубин',          away:'Краснодар',        hc:'#A50034', ha:'РУБ', ac:'#F5C518', aa:'КРД', ts:toUTC(2026,7,26,19,30), venue:'Ак Барс Арена, Казань'},
].sort((a,b)=>a.ts-b.ts);

// ====== СОСТОЯНИЕ ======
let currentUser = null;
let currentMatchId = null;
let matchContext = 'rpl1';
let allPredictions = {};
let allResults = {};

// ====== УТИЛИТЫ ======
function fmtMSK(ts){
  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const dayNames=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const mskD=new Date(ts+3*3600000);
  const h=String(mskD.getUTCHours()).padStart(2,'0');
  const m=String(mskD.getUTCMinutes()).padStart(2,'0');
  const day=mskD.getUTCDate(),mon=mskD.getUTCMonth(),wd=mskD.getUTCDay();
  return{time:`${h}:${m}`,date:`${day} ${months[mon]}`,dayName:dayNames[wd],
    key:`${mskD.getUTCFullYear()}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`};
}
function isOpen(m){return Date.now()<m.ts-3600000}
function isFinished(m){return!!allResults[m.id]}

function calcPoints(ph,pa,rh,ra){
  ph=+ph;pa=+pa;rh=+rh;ra=+ra;
  if(ph===rh&&pa===ra)return 4;
  if((ph-pa)===(rh-ra))return 2;
  const pr=ph>pa?'h':ph<pa?'a':'d',rr=rh>ra?'h':rh<ra?'a':'d';
  if(pr===rr)return 1;
  return 0;
}

function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isErr?' err-toast':'');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function teamBadge(abbr, color){
  const dark = ['#F5C518','#FF8C00','#FFD700'].includes(color);
  return `<div class="team-badge${dark?' dk':''}" style="background:${color}">${abbr}</div>`;
}

// ====== ЗАГРУЗКА ======
async function loadData(){
  const [predsRes, resRes] = await Promise.all([
    sb.from('predictions').select('match_id,home_score,away_score,users(username)'),
    sb.from('results').select('*')
  ]);
  allPredictions={};
  if(predsRes.data){
    predsRes.data.forEach(p=>{
      if(!allPredictions[p.match_id])allPredictions[p.match_id]=[];
      allPredictions[p.match_id].push({username:p.users.username,home_score:p.home_score,away_score:p.away_score});
    });
  }
  allResults={};
  if(resRes.data) resRes.data.forEach(r=>{allResults[r.match_id]={home_score:r.home_score,away_score:r.away_score};});
}

// ====== НАВИГАЦИЯ ======
function showPage(id, matchId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(matchId) currentMatchId=matchId;
  if(id==='rpl1') renderRPL();
  if(id==='match') renderMatchDetail();
  if(id==='leaderboard') renderLeaderboard();
  if(id==='admin') renderAdmin();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-tab'));
  const map={rpl1:'tabRPL1',leaderboard:'tabLB',admin:'tabAdmin'};
  if(map[id]){const el=document.getElementById(map[id]);if(el)el.classList.add('active-tab');}
}

function renderNav(){
  const nr=document.getElementById('navRight');
  if(!currentUser){
    nr.innerHTML=`<button class="nav-btn" onclick="showPage('login')">Войти</button><button class="nav-btn" onclick="showPage('register')">Регистрация</button>`;
  } else {
    const isAdmin=currentUser.is_admin;
    nr.innerHTML=`<span class="nav-user">👤 <strong>${currentUser.username}</strong></span>
      <button class="nav-btn" id="tabRPL1" onclick="showPage('rpl1')">ЧР тур 1</button>
      <button class="nav-btn" id="tabLB" onclick="showPage('leaderboard')">Таблица</button>
      ${isAdmin?'<button class="nav-btn" id="tabAdmin" onclick="showPage(\'admin\')">Ред.</button>':''}
      <button class="nav-btn" onclick="doLogout()">Выйти</button>`;
    showPage('rpl1');
  }
}

// ====== АВТОРИЗАЦИЯ ======
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!u||!p){err.textContent='Заполните все поля';err.style.display='block';return;}
  const {data,error}=await sb.from('users').select('*').eq('username',u).eq('password',p).single();
  if(error||!data){err.textContent='Неверный логин или пароль';err.style.display='block';return;}
  currentUser=data;
  sessionStorage.setItem('wc2026_user',JSON.stringify(data));
  renderNav();
  await loadData();
  showPage('rpl1');
}

async function doRegister(){
  const u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPass').value,p2=document.getElementById('regPass2').value;
  const err=document.getElementById('regErr');
  err.style.display='none';
  if(!u||u.length<2){err.textContent='Логин минимум 2 символа';err.style.display='block';return;}
  if(!p||p.length<4){err.textContent='Пароль минимум 4 символа';err.style.display='block';return;}
  if(p!==p2){err.textContent='Пароли не совпадают';err.style.display='block';return;}
  const {data:exists}=await sb.from('users').select('id').eq('username',u).single();
  if(exists){err.textContent='Такой логин уже занят';err.style.display='block';return;}
  const {data,error}=await sb.from('users').insert({username:u,password:p,is_admin:false}).select().single();
  if(error){err.textContent='Ошибка: '+error.message;err.style.display='block';return;}
  currentUser=data;
  sessionStorage.setItem('wc2026_user',JSON.stringify(data));
  renderNav();
  await loadData();
  showPage('rpl1');
}

function doLogout(){
  currentUser=null;
  sessionStorage.removeItem('wc2026_user');
  allPredictions={};allResults={};
  renderNav();
  showPage('login');
}

// ====== СТАТУС МАТЧА ======
function getMatchStatus(m){
  if(isFinished(m))return{label:'Завершён',cls:'status-finished'};
  if(!isOpen(m))return{label:'Закрыт',cls:'status-closed'};
  return{label:'Открыт',cls:'status-open'};
}

// ====== РПЛ: СПИСОК МАТЧЕЙ ======
function buildRPLCard(m){
  const f=fmtMSK(m.ts);
  const st=getMatchStatus(m);
  const preds=allPredictions[m.id]||[];
  const myPred=currentUser?preds.find(p=>p.username===currentUser.username):null;
  const result=allResults[m.id];
  let bottom='';
  if(!isOpen(m)||isFinished(m)){
    const tags=preds.map(p=>{
      const pts=result?calcPoints(p.home_score,p.away_score,result.home_score,result.away_score):null;
      return `<span class="pred-tag">${p.username}: ${p.home_score}-${p.away_score}${pts!==null?` <span class="pts">(+${pts})</span>`:''}</span>`;
    }).join('');
    if(tags) bottom=`<div class="match-bottom"><div class="preds-list">${tags}</div></div>`;
  } else if(myPred){
    bottom=`<div class="match-bottom">Мой прогноз: <span class="my-pred">${myPred.home_score}-${myPred.away_score}</span></div>`;
  }
  const scoreStr=result
    ?`<span class="result-score">${result.home_score}:${result.away_score}</span>`
    :`<div class="match-time">${f.time}</div><div class="match-meta">GMT+3</div>`;
  return `<div class="match-card${myPred?' has-pred':''}" onclick="showPage('match','${m.id}')">
    <div class="match-top">
      <div class="team-block">${teamBadge(m.ha,m.hc)}<div class="team-name">${m.home}</div></div>
      <div class="vs-block">${scoreStr}<span class="match-status ${st.cls}">${st.label}</span></div>
      <div class="team-block right">${teamBadge(m.aa,m.ac)}<div class="team-name">${m.away}</div></div>
    </div>${bottom}</div>`;
}

function buildDayGroups(matches){
  const byDay={};
  matches.forEach(m=>{
    const f=fmtMSK(m.ts);
    if(!byDay[f.key])byDay[f.key]=[];
    byDay[f.key].push(m);
  });
  const dayNamesRu=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const monthsRu=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  let html='';
  for(const dk of Object.keys(byDay).sort()){
    const[y,mo,da]=dk.split('-');
    const wd=new Date(Date.UTC(+y,+mo-1,+da)).getUTCDay();
    html+=`<div class="day-header">📅 ${+da} ${monthsRu[+mo-1]} — ${dayNamesRu[wd]}</div>`;
    byDay[dk].forEach(m=>{ html+=buildRPLCard(m); });
  }
  return html;
}

function renderRPL(){
  const finished=RPL_MATCHES.filter(m=>isFinished(m));
  const upcoming=RPL_MATCHES.filter(m=>!isFinished(m));
  let html='';
  if(finished.length>0){
    html+=`<div class="finished-section">
      <div class="finished-header" onclick="toggleFinished()">
        <span>✅ Завершённые матчи (${finished.length})</span>
        <span id="finishedArrow" style="transition:transform 0.2s;">▼</span>
      </div>
      <div id="finishedList" style="display:none;">${buildDayGroups(finished)}</div>
    </div>`;
  }
  html+=buildDayGroups(upcoming);
  document.getElementById('rpl1List').innerHTML=html||'<div style="color:#6B8AA8;padding:20px;text-align:center;">Матчи скоро начнутся</div>';
}

function toggleFinished(){
  const list=document.getElementById('finishedList');
  const arrow=document.getElementById('finishedArrow');
  if(list.style.display==='none'){list.style.display='block';arrow.style.transform='rotate(180deg)';}
  else{list.style.display='none';arrow.style.transform='rotate(0deg)';}
}

// ====== СТРАНИЦА МАТЧА ======
function renderMatchDetail(){
  const m=RPL_MATCHES.find(x=>x.id===currentMatchId);if(!m)return;
  const f=fmtMSK(m.ts);
  const st=getMatchStatus(m);
  const preds=allPredictions[m.id]||[];
  const myPred=currentUser?preds.find(p=>p.username===currentUser.username):null;
  const result=allResults[m.id];
  const open=isOpen(m),finished=isFinished(m);
  let predSection='';
  if(open&&currentUser){
    const h=myPred?myPred.home_score:'',a=myPred?myPred.away_score:'';
    predSection=`<div class="predict-box"><div class="predict-title">Ваш прогноз</div>
      <div class="score-input-row">
        <div class="team-label" style="display:flex;flex-direction:column;align-items:center;">${teamBadge(m.ha,m.hc)}<span style="margin-top:4px;">${m.home}</span></div>
        <input class="score-num" type="number" min="0" max="20" id="ph" value="${h}" placeholder="0">
        <span class="score-dash">—</span>
        <input class="score-num" type="number" min="0" max="20" id="pa" value="${a}" placeholder="0">
        <div class="team-label" style="display:flex;flex-direction:column;align-items:center;">${teamBadge(m.aa,m.ac)}<span style="margin-top:4px;">${m.away}</span></div>
      </div>
      <button class="btn-login" onclick="savePred('${m.id}')">СОХРАНИТЬ ПРОГНОЗ</button>
      ${myPred?`<div style="text-align:center;margin-top:10px;font-size:12px;color:#6B8AA8;">Текущий: <span style="color:#F4A90A;font-weight:600">${myPred.home_score}–${myPred.away_score}</span></div>`:''}
    </div>`;
  } else if(!open&&!finished){
    predSection=`<div class="predict-box"><div class="closed-msg">⏰ Приём прогнозов закрыт (менее 1 часа до матча)</div>
      ${myPred?`<div style="text-align:center;color:#9BB3CC;font-size:13px;">Ваш прогноз: <span style="color:#F4A90A;font-weight:600">${myPred.home_score}–${myPred.away_score}</span></div>`:'<div style="text-align:center;color:#6B8AA8;font-size:13px;">Вы не сделали прогноз</div>'}
    </div>`;
  } else if(finished){
    const myPts=myPred?calcPoints(myPred.home_score,myPred.away_score,result.home_score,result.away_score):null;
    predSection=`<div class="predict-box">
      <div style="text-align:center;margin-bottom:14px;">
        <div style="font-size:11px;color:#6B8AA8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Итоговый счёт</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:44px;color:#27b44b;letter-spacing:4px;">${result.home_score} : ${result.away_score}</div>
      </div>
      ${myPred?`<div style="text-align:center;padding:10px;background:#0D1B2A;border-radius:8px;">
        <span style="font-size:13px;color:#9BB3CC;">Ваш прогноз: <strong style="color:#F4A90A;">${myPred.home_score}–${myPred.away_score}</strong></span>
        <span style="margin-left:12px;font-size:13px;color:${myPts>0?'#27b44b':'#6B8AA8'};">
          ${myPts===4?'🎯 Точный счёт':myPts===2?'✅ Разница голов':myPts===1?'👍 Верный исход':'❌ Мимо'}
          <strong style="color:#F4A90A;"> +${myPts}</strong>
        </span>
      </div>`:'<div style="text-align:center;color:#6B8AA8;font-size:13px;">Прогноз не был сделан</div>'}
    </div>`;
  }
  const predsHTML=(!open||finished)&&preds.length?`<div class="all-preds"><div class="preds-title">Прогнозы всех участников</div>${preds.map(p=>{
    const pts=result?calcPoints(p.home_score,p.away_score,result.home_score,result.away_score):null;
    return `<div class="pred-row"><span class="pred-user">👤 ${p.username}</span><span style="font-weight:500;">${p.home_score} — ${p.away_score}</span>${pts!==null?`<span class="pred-pts-badge">+${pts}</span>`:''}</div>`;
  }).join('')}</div>`:'';
  document.getElementById('matchDetail').innerHTML=`
    <div class="match-hero">
      <div class="hero-teams">
        <div class="hero-team">
          <div style="display:flex;justify-content:center;margin-bottom:6px;">${teamBadge(m.ha,m.hc).replace('width:38px;height:38px','width:56px;height:56px;font-size:12px')}</div>
          <div class="hero-name">${m.home}</div>
        </div>
        ${finished?`<div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:#27b44b;letter-spacing:4px;">${result.home_score} : ${result.away_score}</div>`:`<div class="hero-vs">VS</div>`}
        <div class="hero-team">
          <div style="display:flex;justify-content:center;margin-bottom:6px;">${teamBadge(m.aa,m.ac).replace('width:38px;height:38px','width:56px;height:56px;font-size:12px')}</div>
          <div class="hero-name">${m.away}</div>
        </div>
      </div>
      <div style="font-size:12px;color:#6B8AA8;margin-top:4px;">📅 ${f.date} · ⏰ ${f.time} GMT+3 · 📍 ${m.venue} · <span class="match-status ${st.cls}">${st.label}</span></div>
    </div>
    ${predSection}${predsHTML}`;
}

async function savePred(mid){
  const h=document.getElementById('ph').value,a=document.getElementById('pa').value;
  if(h===''||a===''){showToast('Введите счёт',true);return;}
  const {error}=await sb.from('predictions').upsert({user_id:currentUser.id,match_id:mid,home_score:+h,away_score:+a},{onConflict:'user_id,match_id'});
  if(error){showToast('Ошибка: '+error.message,true);return;}
  showToast('Прогноз сохранён ✓');
  await loadData();
  renderMatchDetail();
  renderRPL();
}

function goBackFromMatch(){showPage('rpl1');}

// ====== ТАБЛИЦА ЧР ТУР 1 ======
function renderLeaderboard(){
  const rplIds=new Set(RPL_MATCHES.map(m=>m.id));
  const pts={},counts={},games={};
  const finishedIds=Object.keys(allResults).filter(mid=>rplIds.has(mid));
  finishedIds.forEach(mid=>{
    (allPredictions[mid]||[]).forEach(p=>{
      if(!pts[p.username]){pts[p.username]=0;counts[p.username]={exact:0,diff:0,res:0};games[p.username]=0;}
    });
  });
  finishedIds.forEach(mid=>{
    const r=allResults[mid];
    (allPredictions[mid]||[]).forEach(p=>{
      const pt=calcPoints(p.home_score,p.away_score,r.home_score,r.away_score);
      pts[p.username]+=pt;
      if(pt===4)counts[p.username].exact++;
      else if(pt===2)counts[p.username].diff++;
      else if(pt===1)counts[p.username].res++;
    });
  });
  Object.keys(pts).forEach(u=>{
    games[u]=finishedIds.filter(mid=>(allPredictions[mid]||[]).some(p=>p.username===u)).length;
  });
  const lb=Object.keys(pts).map(u=>({user:u,pts:pts[u],counts:counts[u],games:games[u]}))
    .sort((a,b)=>b.pts-a.pts||b.counts.exact-a.counts.exact);
  const el=document.getElementById('lbContent');
  if(!lb.length){
    el.innerHTML=`<div class="lb-empty"><div style="font-size:32px;margin-bottom:10px;">📋</div><div>Таблица пустая — очки появятся после завершённых матчей</div></div>
    <div class="lb-legend"><strong style="color:#E8EDF2;">Система начисления очков:</strong><br>
    🎯 Точный счёт — <span style="color:#F4A90A;">+4 очка</span><br>
    ✅ Разница голов — <span style="color:#F4A90A;">+2 очка</span><br>
    👍 Исход (победа / ничья) — <span style="color:#F4A90A;">+1 очко</span></div>`;
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const rows=lb.map((e,i)=>`<tr>
    <td><span class="lb-rank ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</span></td>
    <td><div class="lb-name">${medals[i]||''}${e.user}</div>
    <div class="lb-sub">🎯 ${e.counts.exact} &nbsp;✅ ${e.counts.diff} &nbsp;👍 ${e.counts.res} &nbsp;· матчей: ${e.games}</div></td>
    <td class="lb-pts-cell"><div class="lb-pts">${e.pts}</div><span class="lb-pts-label">очков</span></td>
  </tr>`).join('');
  el.innerHTML=`<table class="lb-table">
    <thead><tr><th style="width:36px;">#</th><th>Участник</th><th class="right">Очки</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="lb-legend">🎯 точный счёт (+4) &nbsp;&nbsp; ✅ разница голов (+2) &nbsp;&nbsp; 👍 исход матча (+1)</div>`;
}

// ====== ADMIN ======
function renderAdmin(){
  document.getElementById('adminList').innerHTML=RPL_MATCHES.map(m=>{
    const f=fmtMSK(m.ts);const r=allResults[m.id];
    return `<div class="admin-match">
      <div class="admin-match-name">${m.home} — ${m.away}
        <span style="font-size:11px;color:#6B8AA8;margin-left:6px;">${f.date} ${f.time} GMT+3</span>
      </div>
      <div class="admin-row">
        <input class="admin-score-in" type="number" min="0" max="20" id="rh_${m.id}" value="${r?r.home_score:''}" placeholder="Д">
        <span style="color:#6B8AA8;font-size:18px;font-weight:bold;">:</span>
        <input class="admin-score-in" type="number" min="0" max="20" id="ra_${m.id}" value="${r?r.away_score:''}" placeholder="Г">
        <button class="btn-small" onclick="saveResult('${m.id}')">Сохранить</button>
        ${r?`<button class="btn-small danger" onclick="delResult('${m.id}')">Удалить</button><span style="font-size:12px;color:#27b44b;margin-left:4px;">✓ ${r.home_score}:${r.away_score}</span>`:''}

async function saveResult(mid){
  const h=document.getElementById('rh_'+mid).value,a=document.getElementById('ra_'+mid).value;
  if(h===''||a==='')return;
  const {error}=await sb.from('results').upsert({match_id:mid,home_score:+h,away_score:+a},{onConflict:'match_id'});
  if(error){showToast('Ошибка: '+error.message,true);return;}
  showToast('Результат сохранён ✓');
  await loadData();renderAdmin();
}
async function delResult(mid){
  const {error}=await sb.from('results').delete().eq('match_id',mid);
  if(error){showToast('Ошибка: '+error.message,true);return;}
  showToast('Результат удалён');
  await loadData();renderAdmin();
}

    currentUser=JSON.parse(saved);

    showPage('rpl1');
